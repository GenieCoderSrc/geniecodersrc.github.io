<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenieCoderSrc - Published Pub Packages</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            color: #24292f;
        }
        h1 {
            border-bottom: 1px solid #d8dee4;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #d8dee4;
        }
        th {
            background-color: #f6f8fa;
            font-weight: 600;
        }
        a {
            color: #0969da;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 2em;
            background-color: #ddf4ff;
            color: #0969da;
        }
        .loading {
            font-style: italic;
            color: #57606a;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <h1>Published Dart/Flutter Packages</h1>
    <p>A collection of open-source packages maintained by GenieCoderSrc.</p>

    <div id="status" class="loading">Loading packages from GitHub...</div>

    <table id="package-table" style="display: none;">
        <thead>
            <tr>
                <th>Package Name</th>
                <th>Repository Type</th>
                <th>GitHub Repository</th>
                <th>Pub.dev</th>
            </tr>
        </thead>
        <tbody id="package-list">
            <!-- Dynamic packages are injected here -->
        </tbody>
    </table>

    <script>
        const USER = 'GenieCoderSrc';
        const MONOREPO = 'pub_package_monorepo';
        const excludedRepos = [MONOREPO, 'geniecodersrc.github.io', '.github'];

        async function fetchPackages() {
            const statusEl = document.getElementById('status');
            const tableEl = document.getElementById('package-table');
            const listEl = document.getElementById('package-list');
            let allPackages = [];

            try {
                // 1. Fetch monorepo packages
                const monoUrl = `https://api.github.com/repos/${USER}/${MONOREPO}/contents/packages`;
                const monoResponse = await fetch(monoUrl);
                if (monoResponse.ok) {
                    const contents = await monoResponse.json();
                    contents.forEach(item => {
                        if (item.type === 'dir') {
                            allPackages.push({
                                name: item.name,
                                type: 'Monorepo',
                                repoUrl: `https://github.com/${USER}/${MONOREPO}/tree/main/packages/${item.name}`,
                                pubUrl: `https://pub.dev/packages/${item.name}`
                            });
                        }
                    });
                }

                // 2. Fetch standalone repositories (Max 100 repos)
                const reposUrl = `https://api.github.com/users/${USER}/repos?per_page=100`;
                const reposResponse = await fetch(reposUrl);
                if (reposResponse.ok) {
                    const repos = await reposResponse.json();
                    repos.forEach(repo => {
                        if (!repo.fork && !excludedRepos.includes(repo.name)) {
                            allPackages.push({
                                name: repo.name,
                                type: 'Standalone',
                                repoUrl: repo.html_url,
                                pubUrl: `https://pub.dev/packages/${repo.name}`
                            });
                        }
                    });
                }

                // Sort alphabetically
                allPackages.sort((a, b) => a.name.localeCompare(b.name));

                if (allPackages.length === 0) {
                    statusEl.innerText = "No packages found.";
                    return;
                }

                // Inject generated rows using your exact layout
                listEl.innerHTML = allPackages.map(pkg => `
                    <tr>
                        <td><strong>${pkg.name}</strong></td>
                        <td><span class="badge">${pkg.type}</span></td>
                        <td><a href="${pkg.repoUrl}" target="_blank">View Source</a></td>
                        <td><a href="${pkg.pubUrl}" target="_blank">pub.dev/${pkg.name}</a></td>
                    </tr>
                `).join('');

                statusEl.style.display = 'none';
                tableEl.style.display = 'table';

            } catch (error) {
                statusEl.innerText = "Failed to load packages. Please try refreshing.";
                console.error(error);
            }
        }

        fetchPackages();
    </script>
</body>
</html>
