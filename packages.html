<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenieCoderSrc - Published Pub Packages</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            color: #24292f;
        }
        h1 {
            border-bottom: 1px solid #d8dee4;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #57606a;
            font-size: 16px;
            margin-bottom: 25px;
        }
        .loading {
            font-style: italic;
            color: #57606a;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none; /* Hidden until loaded */
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #d8dee4;
        }
        th {
            background-color: #f6f8fa;
            font-weight: 600;
        }
        a {
            color: #0969da;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 2em;
        }
        .badge-mono { background-color: #ddf4ff; color: #0969da; }
        .badge-standalone { background-color: #dafbe1; color: #1a7f37; }
        .search-box {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Published Dart & Flutter Packages</h1>
    <div class="subtitle">A dynamically updated directory of packages by GenieCoderSrc.</div>

    <input type="text" id="search" class="search-box" placeholder="Search packages by name...">
    
    <div id="status" class="loading">Loading packages from GitHub...</div>

    <table id="package-table">
        <thead>
            <tr>
                <th>Package Name</th>
                <th>Type</th>
                <th>GitHub Repository</th>
                <th>Pub.dev</th>
            </tr>
        </thead>
        <tbody id="package-list">
            <!-- Dynamic rows inject here -->
        </tbody>
    </table>

    <script>
        const USER = 'GenieCoderSrc';
        const MONOREPO = 'pub_package_monorepo';
        
        // Exclude internal configuration repos that aren't Dart/Flutter packages
        const excludedRepos = [MONOREPO, 'geniecodersrc.github.io', '.github'];

        async function fetchPackages() {
            const statusEl = document.getElementById('status');
            const tableEl = document.getElementById('package-table');
            const listEl = document.getElementById('package-list');
            
            let allPackages = [];

            try {
                // 1. Fetch monorepo sub-packages content
                const monoUrl = `https://api.github.com/repos/${USER}/${MONOREPO}/contents/packages`;
                const monoResponse = await fetch(monoUrl);
                if (monoResponse.ok) {
                    const contents = await monoResponse.json();
                    contents.forEach(item => {
                        if (item.type === 'dir') {
                            allPackages.push({
                                name: item.name,
                                type: 'Monorepo',
                                repoUrl: `https://github.com/${USER}/${MONOREPO}/tree/main/packages/${item.name}`,
                                pubUrl: `https://pub.dev/packages/${item.name}`
                            });
                        }
                    });
                }

                // 2. Fetch standalone repositories
                const reposUrl = `https://api.github.com/users/${USER}/repos?per_page=100`;
                const reposResponse = await fetch(reposUrl);
                if (reposResponse.ok) {
                    const repos = await reposResponse.json();
                    repos.forEach(repo => {
                        if (!repo.fork && !excludedRepos.includes(repo.name)) {
                            allPackages.push({
                                name: repo.name,
                                type: 'Standalone',
                                repoUrl: repo.html_url,
                                pubUrl: `https://pub.dev/packages/${repo.name}`
                            });
                        }
                    });
                }

                // Sort packages alphabetically
                allPackages.sort((a, b) => a.name.localeCompare(b.name));

                // Render rows
                function renderTable(packagesToRender) {
                    listEl.innerHTML = packagesToRender.map(pkg => `
                        <tr>
                            <td><strong>${pkg.name}</strong></td>
                            <td><span class="badge ${pkg.type === 'Monorepo' ? 'badge-mono' : 'badge-standalone'}">${pkg.type}</span></td>
                            <td><a href="${pkg.repoUrl}" target="_blank">View Source</a></td>
                            <td><a href="${pkg.pubUrl}" target="_blank">pub.dev/${pkg.name}</a></td>
                        </tr>
                    `).join('');
                }

                if (allPackages.length === 0) {
                    statusEl.innerText = "No published packages found.";
                    return;
                }

                statusEl.style.display = 'none';
                tableEl.style.display = 'table';
                renderTable(allPackages);

                // Setup live search bar functionality
                document.getElementById('search').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allPackages.filter(p => p.name.toLowerCase().includes(term));
                    renderTable(filtered);
                });

            } catch (error) {
                statusEl.innerText = "Failed to load packages. Please try refreshing.";
                console.error(error);
            }
        }

        fetchPackages();
    </script>
</body>
</html>
