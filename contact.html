<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Shohidul Islam</title>
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/cards.css">
    <link rel="stylesheet" href="assets/css/buttons.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="stylesheet" href="assets/css/pages.css">
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
        }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            font-family: var(--font);
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Shohidul Islam</a>
            <button class="nav-toggle" aria-label="Toggle Navigation">☰</button>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="genie.html" class="nav-link">Genie Coder</a></li>
                <li><a href="applications.html" class="nav-link">Enterprise Apps</a></li>
                <li><a href="open-source.html" class="nav-link">Open Source</a></li>
                <li><a href="resume.html" class="nav-link">Resume</a></li>
                <li><a href="https://github.com" target="_blank" class="nav-link">GitHub</a></li>
                <li><a href="https://linkedin.com" target="_blank" class="nav-link">LinkedIn</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Get in Touch</h1>
            <p>For inquiries regarding Flutter platform engineering, structural auditing, or architecture consultations.</p>
        </div>
    </header>

    <main class="container" style="padding-top: 48px; padding-bottom: 48px;">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <form action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="6" class="form-control" required placeholder="Describe your architectural scope or proposal..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Shohidul Islam. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/navigation.js"></script>
</body>
</html>
